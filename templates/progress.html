<!DOCTYPE html>
<html>
<head>
    <title>Progress</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f9;
            padding: 20px;
            margin: 0;
        }

        .site-title {
            text-align: center;
            padding: 18px;
            background: white;
            border-radius: 8px;
            margin: 0 auto 16px auto;
            max-width: 900px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

            .site-title h1 {
                margin: 0;
                font-size: 22px;
            }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .top-nav {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .nav-btn {
            background: #e9ecef;
            color: #333;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
        }

            .nav-btn.active {
                background: #007bff;
                color: white;
            }

        .header-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-bottom: 12px;
        }

        .unit-label {
            color: #666;
            font-size: 13px;
        }

        .unit-toggle {
            border: 1px solid #d0d7de;
            background: #f6f8fa;
            color: #24292f;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="site-title">
        <h1>Ryan's workout tracker</h1>
        <nav class="top-nav" role="navigation" aria-label="top-navigation">
            <a class="nav-btn {% if selected_tab == 'progress' %}active{% endif %}" href="{{ url_for('progress') }}">Progress</a>
            <a class="nav-btn {% if selected_tab == 'log' %}active{% endif %}" href="{{ url_for('index') }}">Log workouts</a>
            <a class="nav-btn {% if selected_tab == 'science' %}active{% endif %}" href="{{ url_for('science') }}">Science</a>
            <a class="nav-btn {% if selected_tab == 'profile' %}active{% endif %}" href="{{ url_for('profile') }}">Profile</a>
        </nav>
    </header>

    <div class="container">
        <div class="header-actions">
            <span class="unit-label">Units: {{ weight_unit.upper() }}</span>
            <form method="post" action="{{ url_for('set_weight_unit') }}" class="inline-form">
                <input type="hidden" name="unit" value="{{ 'lbs' if weight_unit == 'kg' else 'kg' }}">
                <button class="unit-toggle" type="submit">Switch to {{ 'lbs' if weight_unit == 'kg' else 'kg' }}</button>
            </form>
        </div>

        <h2>Progress</h2>
        <p>Placeholder for progress charts and metrics. Implement as needed.</p>
    </div>
</body>
</html>
