<!DOCTYPE html>
<html>
<head>
    <title>Login / Register</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f9;
            padding: 50px;
        }

        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        input, button {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            box-sizing: border-box;
        }

        .msg {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <header class="site-title">
        <h1>Ryan's workout tracker</h1>
        <nav class="top-nav" role="navigation" aria-label="top-navigation">
            <a class="nav-btn {% if selected_tab == 'progress' %}active{% endif %}" href="{{ url_for('progress') }}">Progress</a>
            <a class="nav-btn {% if selected_tab == 'log' %}active{% endif %}" href="{{ url_for('index') }}">Log workouts</a>
            <a class="nav-btn {% if selected_tab == 'science' %}active{% endif %}" href="{{ url_for('science') }}">Science</a>
            <a class="nav-btn {% if selected_tab == 'profile' %}active{% endif %}" href="{{ url_for('profile') }}">Profile</a>
        </nav>
    </header>
    <div class="container">
        <h2>Welcome to Fitness Tracker</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="msg">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" name="action" value="login" style="background: #007bff; color: white; border: none;">Login</button>
            <button type="submit" name="action" value="register" style="background: #28a745; color: white; border: none;">Register New Account</button>
        </form>
    </div>
</body>
</html>
